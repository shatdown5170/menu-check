<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="color-scheme" content="light only">
<meta name="supported-color-schemes" content="light">
<title>메뉴 검수</title>
<style>
  :root{
    color-scheme: light only;
    --ink:#37352F; --gray:#9B9A97; --gray2:#787774;
    --line:#EAE9E5; --line2:#EDEDEC; --bg:#F7F6F3; --card:#FFFFFF; --hover:#EFEEEA;
    --pill:#EDECE8; --pill-on:#E3E2DD;
    --blue:#2383E2; --blue-soft:#E7F1FB;
    --tag-org-bg:#FAEBDD; --tag-org-fg:#D9730D;
    --tag-blue-bg:#D3E5EF; --tag-blue-fg:#0B6E99;
    --tag-gray-bg:#EDECE8; --tag-gray-fg:#787774;
    --tag-green-bg:#DBEDDB; --tag-green-fg:#448361;
    --radius:10px;
  }
  /* 다크모드 기기에서도 라이트 고정 (브라우저 강제 반전 방지) */
  @media (prefers-color-scheme: dark){
    :root{
      --ink:#37352F; --gray:#9B9A97; --gray2:#787774;
      --line:#EAE9E5; --line2:#EDEDEC; --bg:#F7F6F3; --card:#FFFFFF; --hover:#EFEEEA;
      --pill:#EDECE8; --pill-on:#E3E2DD;
    }
    html,body{background:#F7F6F3 !important;color:#37352F !important;}
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Pretendard",Roboto,"Malgun Gothic",sans-serif;
    -webkit-font-smoothing:antialiased;}
  body{padding-bottom:120px;line-height:1.5;}

  .top{position:sticky;top:0;z-index:10;background:rgba(247,246,243,.88);backdrop-filter:saturate(180%) blur(14px);
    padding:18px 20px 12px;}
  .top h1{margin:0;font-size:27px;font-weight:800;letter-spacing:-0.6px;line-height:1.15;}
  .top p{margin:6px 0 0;font-size:14px;color:var(--gray);font-weight:400;}
  .steps{display:flex;gap:6px;margin-top:15px;}
  .steps .dot{flex:1;height:30px;border-radius:99px;background:var(--pill);display:flex;align-items:center;justify-content:center;
    font-size:11.5px;font-weight:600;color:var(--gray);transition:.2s;letter-spacing:.2px;}
  .steps .dot.on{background:var(--ink);color:#fff;}
  .steps .dot.done{background:var(--pill-on);color:var(--gray2);}

  .page{padding:22px;display:none;}
  .page.show{display:block;animation:fade .22s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}

  label.fld{display:block;font-size:12px;font-weight:600;color:var(--gray);margin:0 0 8px 2px;letter-spacing:.2px;}
  textarea,input,select{font-family:inherit;font-size:16px;color:var(--ink);}
  textarea{width:100%;min-height:170px;border:none;border-radius:14px;padding:16px;resize:vertical;
    line-height:1.65;background:var(--card);box-shadow:0 1px 2px rgba(15,15,15,.05),0 0 0 1px rgba(15,15,15,.04);}
  textarea::placeholder{color:#B6B5B1;}
  textarea:focus,input:focus,select:focus{outline:none;}
  textarea:focus{box-shadow:0 0 0 2px var(--blue);}

  .hint{font-size:13px;color:var(--gray);line-height:1.6;margin:10px 2px 0;}

  /* 입력 화면 액션 카드 (Notion 블록 느낌) */
  .photo{display:flex;align-items:center;gap:12px;width:100%;padding:16px;border:none;
    background:var(--card);color:var(--ink);font-size:15.5px;font-weight:500;border-radius:14px;margin-bottom:10px;
    text-align:left;transition:transform .12s,background .15s;box-shadow:0 1px 2px rgba(15,15,15,.05),0 0 0 1px rgba(15,15,15,.04);}
  .photo:active{background:var(--hover);transform:scale(.99);}
  .photo .ico{width:34px;height:34px;flex:none;border-radius:9px;display:grid;place-items:center;font-size:17px;}
  .photo .ico.cam{background:var(--tag-org-bg);}
  .photo .ico.gal{background:var(--tag-blue-bg);}
  .photo .arr{margin-left:auto;color:var(--gray);font-size:18px;font-weight:300;}

  .ghost{display:block;width:100%;margin-top:12px;padding:13px;border:1px dashed #D6D4CE;
    background:transparent;color:var(--gray2);font-size:14.5px;font-weight:500;border-radius:12px;transition:background .15s;}
  .ghost:active{background:var(--hover);}

  .or{text-align:center;color:var(--gray);font-size:12px;margin:20px 0 14px;position:relative;font-weight:500;letter-spacing:.3px;}
  .or::before,.or::after{content:"";position:absolute;top:50%;width:40%;height:1px;background:var(--line);}
  .or::before{left:0;} .or::after{right:0;}

  .status{margin-top:14px;font-size:14px;color:var(--gray2);font-weight:500;text-align:center;display:none;
    background:var(--hover);border-radius:var(--radius);padding:12px;}
  .status.show{display:block;}
  .spin{display:inline-block;width:13px;height:13px;border:2px solid var(--line);border-top-color:var(--gray2);
    border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px;margin-right:7px;}
  @keyframes sp{to{transform:rotate(360deg);}}

  /* 메뉴 행 (Notion 데이터베이스 행 느낌) */
  .row{background:var(--card);border:none;border-radius:14px;padding:15px 16px;margin-bottom:10px;
    box-shadow:0 1px 2px rgba(15,15,15,.05),0 0 0 1px rgba(15,15,15,.04);}
  .row .line{display:flex;gap:8px;align-items:center;}
  .row input.name{flex:1;min-width:0;border:none;border-bottom:1px solid transparent;border-radius:0;padding:4px 2px;background:transparent;
    font-size:16px;font-weight:500;}
  .row input.name:focus{box-shadow:none;border-bottom-color:var(--blue);background:transparent;}
  .row input.price{width:96px;border:none;border-bottom:1px solid transparent;border-radius:0;padding:4px 2px;background:transparent;
    text-align:right;font-variant-numeric:tabular-nums;color:var(--gray2);}
  .row input.price:focus{box-shadow:none;border-bottom-color:var(--blue);background:transparent;}
  .row .sub{display:flex;gap:9px;align-items:center;margin-top:12px;}
  .catdot{width:9px;height:9px;border-radius:50%;flex:none;margin-left:3px;}
  .row select{flex:1;border:none;border-radius:8px;padding:9px 11px;background:var(--hover)
    url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8'><path d='M1 1l5 5 5-5' stroke='%239B9A97' stroke-width='1.6' fill='none' stroke-linecap='round'/></svg>")
    no-repeat right 11px center;-webkit-appearance:none;appearance:none;font-size:14px;color:var(--gray2);font-weight:500;}
  .row .del{width:36px;height:36px;flex:none;border:none;background:transparent;border-radius:6px;color:var(--gray);font-size:17px;}
  .row .del:active{background:var(--hover);}

  /* 배지 = 수취 항목 (pill) — 전부 동일하게 필수(붉은색) */
  .badge{display:inline-flex;flex-wrap:wrap;gap:6px;margin-top:11px;}
  .badge .pill{font-size:12.5px;font-weight:500;padding:3px 9px;border-radius:99px;
    background:#FBE4E4;color:#B3403A;line-height:1.5;}
  .badge.ok{margin-top:11px;}
  .badge.ok .pill{background:var(--tag-green-bg);color:var(--tag-green-fg);}

  /* 판독 불가 배너 (메뉴 확인 최상단) */
  .nrbanner{background:#FBE4E4;border:1px solid #F0B6B2;border-radius:14px;padding:14px;margin-bottom:14px;}
  .nrbanner .nrhd{display:flex;align-items:center;gap:7px;font-size:14.5px;font-weight:700;color:#B3403A;}
  .nrbanner .nrsub{font-size:12.5px;color:#B3403A;opacity:.85;margin:6px 0 11px;line-height:1.55;}
  .nritem{display:flex;gap:10px;align-items:center;background:#fff;border-radius:10px;padding:8px;margin-top:7px;}
  .nritem img,.nritem .noimg{width:58px;height:46px;flex:none;border-radius:6px;object-fit:cover;background:var(--pill);}
  .nritem .noimg{display:flex;align-items:center;justify-content:center;color:var(--gray);font-size:18px;}
  .nritem .nrtxt b{font-size:13px;font-weight:600;display:block;}
  .nritem .nrtxt span{font-size:12px;color:var(--gray2);}

  /* 디쉬그룹 헤더 (접기/펼치기) */
  .grphead{display:flex;align-items:center;gap:8px;padding:12px 14px;margin:4px 0 10px;
    background:var(--pill);border-radius:12px;cursor:pointer;user-select:none;}
  .grphead .chev{font-size:20px;color:var(--ink);transition:transform .15s;width:20px;text-align:center;line-height:1;flex:none;}
  .grphead .chev.closed{transform:rotate(-90deg);}
  .grphead .gname{font-size:14.5px;font-weight:700;letter-spacing:-.2px;}
  .grphead .gnote{font-size:12.5px;color:var(--gray);font-weight:500;}
  .grphead .gcount{margin-left:auto;font-size:12.5px;color:var(--gray);font-weight:600;}

  /* 디쉬 카드 내부: 수량/제공 + 구성 입력 — 빈 칸과 입력값을 명확히 구분 */
  .row .meta{display:flex;gap:8px;margin-top:11px;}
  .row input.mini,.row input.comp{border:1px solid transparent;border-radius:8px;padding:8px 11px;
    background:var(--hover);font-size:13.5px;color:var(--ink);font-weight:500;}
  .row input.mini{flex:1;min-width:0;}
  .row input.comp{width:100%;margin-top:8px;}
  /* 입력 안 된 빈 칸: 점선 테두리 + 투명 배경 + 흐린 기울임 예시 → '공란'임이 한눈에 */
  .row input.mini:placeholder-shown,.row input.comp:placeholder-shown{
    background:transparent;border:1px dashed #D2D0CA;color:var(--gray2);font-weight:400;}
  .row input.mini::placeholder,.row input.comp::placeholder{color:#B6B5B1;font-style:italic;}
  /* 수취 항목이 입력을 요구하는 빈 칸 → 붉게 강조해 입력을 유도 (채우면 자동 해제) */
  .row input.req:placeholder-shown{background:#FBE4E4;border:1px dashed #E0938E;color:#B3403A;}
  .row input.req::placeholder{color:#CB8B86;font-style:italic;}
  .row input.price.req:placeholder-shown{background:#FBE4E4;border-radius:6px;border-bottom-color:#E0938E;color:#B3403A;}
  /* 구체적 품명 확인: 디쉬명에 값이 있어도(일반 품명) 붉게 강조해 구체화 유도 */
  .row input.name.reqname{background:#FBE4E4;color:#B3403A;border-radius:6px;border-bottom-color:#E0938E;padding-left:8px;}
  .row input.mini:focus,.row input.comp:focus{box-shadow:0 0 0 2px var(--blue);background:#fff;border-color:transparent;}
  /* 카드 라벨 행: 왼쪽 항목명(양/구성/검수 유형/수취 항목) + 오른쪽 입력 */
  .row .pricelab{flex:none;font-size:12.5px;font-weight:700;color:var(--gray2);margin-left:6px;}
  .row .frow{display:flex;align-items:center;gap:10px;margin-top:10px;}
  .row .frow .flab{flex:none;width:62px;font-size:12.5px;font-weight:700;color:var(--gray2);}
  .row .frow .mini{margin-top:0;}
  .row .frow .comp{width:auto;flex:1;margin-top:0;}
  .row .frow select{flex:1;}
  .row .frow .badge,.row .frow .badge.ok{margin-top:0;flex:1;}
  /* 양 행 안의 조리여부: 오른쪽에 작은 라벨 + 좁은 드롭다운 */
  .row .frow .flab-r{flex:none;width:auto;margin-left:4px;}
  .row .frow select.cooksel{flex:none;width:96px;}

  .fill{background:var(--card);border:none;border-radius:14px;padding:16px;margin-bottom:10px;
    box-shadow:0 1px 2px rgba(15,15,15,.05),0 0 0 1px rgba(15,15,15,.04);}
  .fill .mname{font-size:16px;font-weight:600;margin-bottom:2px;}
  .fill .ask{font-size:13px;color:var(--ink);font-weight:600;margin:13px 0 7px;}
  .fill .ask .sev{display:inline-block;font-size:11px;font-weight:700;padding:1px 7px;border-radius:99px;margin-right:7px;vertical-align:1px;}
  .fill .ask .sev.block{background:#FBE4E4;color:#B3403A;}
  .fill .ask .sev.must{background:var(--tag-org-bg);color:var(--tag-org-fg);}
  .fill .ask .sev.rec{background:#FBF3DB;color:#947101;}
  .fill .askn{font-size:12px;color:var(--gray);font-weight:500;margin-left:4px;}
  .fill input.ans{width:100%;border:none;border-radius:8px;padding:11px 12px;background:var(--hover);font-size:15px;}
  .fill input.ans:focus{box-shadow:0 0 0 2px var(--blue);background:#fff;}
  .fill select.ansSel{width:100%;border:none;border-radius:8px;padding:11px 12px;background:var(--hover);font-size:15px;}
  .fill select.ansSel:focus{box-shadow:0 0 0 2px var(--blue);background:#fff;}
  .seg{display:flex;gap:8px;}
  .seg button{flex:1;padding:11px;border:1px solid var(--line);background:#fff;border-radius:var(--radius);font-size:14.5px;font-weight:500;color:var(--gray2);}
  .seg button.sel{border-color:var(--blue);background:var(--blue-soft);color:var(--blue);font-weight:600;}

  /* 출력 = Notion callout 블록 */
  .out{background:var(--card);border:none;border-radius:14px;padding:18px;
    white-space:pre-wrap;font-size:15px;line-height:1.85;box-shadow:0 1px 2px rgba(15,15,15,.05),0 0 0 1px rgba(15,15,15,.04);}
  .out h3{margin:0 0 10px;font-size:12px;color:var(--gray);font-weight:600;letter-spacing:.3px;text-transform:none;}
  .out + .out{margin-top:12px;}

  .footer{position:fixed;left:0;right:0;bottom:0;background:linear-gradient(transparent,var(--bg) 35%);
    padding:14px 18px 22px;display:flex;gap:10px;align-items:center;}
  .btn{flex:1;border:none;border-radius:99px;padding:16px;font-size:15.5px;font-weight:600;transition:transform .12s,background .15s;}
  .btn.primary{background:var(--ink);color:#fff;box-shadow:0 4px 14px rgba(15,15,15,.18);}
  .btn.primary:active{transform:scale(.98);background:#2A2823;}
  .btn.primary:disabled{background:#C2C0BA;box-shadow:none;}
  .btn.sub{flex:none;width:52px;height:52px;padding:0;border-radius:50%;background:var(--card);
    color:var(--gray2);font-size:20px;box-shadow:0 1px 3px rgba(15,15,15,.1),0 0 0 1px rgba(15,15,15,.04);}
  .btn.sub:active{background:var(--hover);transform:scale(.96);}

  .empty{text-align:center;color:var(--gray);padding:48px 0;font-size:14.5px;line-height:1.7;}
  .imgwarn{background:var(--tag-org-bg);color:var(--tag-org-fg);border-radius:var(--radius);
    padding:12px 14px;font-size:13.5px;line-height:1.6;font-weight:500;margin-bottom:12px;display:flex;gap:9px;align-items:flex-start;}
  .imgwarn::before{content:"⚠";font-size:15px;flex:none;}

  .toast{position:fixed;left:50%;bottom:110px;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;padding:11px 20px;border-radius:8px;font-size:14px;font-weight:500;opacity:0;transition:.25s;pointer-events:none;z-index:50;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div class="top">
  <h1 id="title">메뉴 입력</h1>
  <p id="subtitle">메뉴판 사진을 찍거나 텍스트를 붙여넣으세요</p>
  <div class="steps" id="steps">
    <div class="dot on">입력</div><div class="dot">메뉴 확인</div><div class="dot">확인사항</div><div class="dot">완료</div>
  </div>
</div>

<!-- STEP 0 -->
<div class="page show" id="p0">
  <button class="photo" onclick="document.getElementById('fileCamera').click()">
    <span class="ico cam">📷</span>카메라로 촬영<span class="arr">›</span></button>
  <button class="photo" onclick="document.getElementById('fileGallery').click()">
    <span class="ico gal">🖼</span>사진첩에서 선택<span class="arr">›</span></button>
  <input id="fileCamera" type="file" accept="image/*" capture="environment" style="display:none" onchange="handlePhotos(this.files)">
  <input id="fileGallery" type="file" accept="image/*" multiple style="display:none" onchange="handlePhotos(this.files)">
  <div class="status" id="status"></div>
  <div class="or">또는 직접 입력</div>
  <textarea id="raw" placeholder="한 줄에 메뉴 하나씩&#10;예) 모둠초밥 25,000&#10;참치초밥 8000&#10;우럭 매운탕 35,000원"></textarea>
  <button class="ghost" onclick="loadSample()">샘플 메뉴 불러오기</button>
</div>

<!-- STEP 1 -->
<div class="page" id="p1">
  <div id="rows"></div>
  <button class="ghost" onclick="addRow()">+ 메뉴 직접 추가</button>
</div>

<!-- STEP 2 -->
<div class="page" id="p2"><div id="fills"></div></div>

<!-- STEP 3 -->
<div class="page" id="p3">
  <div class="out"><h3>정리된 메뉴판</h3><div id="outMenu"></div></div>
  <div class="out"><h3>세일즈 확인 요청 요약</h3><div id="outAsk"></div></div>
  <button class="ghost" onclick="restart()">＋ 새 메뉴판 검수하기 (처음으로)</button>
</div>

<div class="footer">
  <button class="btn sub" id="backBtn" onclick="go(-1)" style="display:none" aria-label="이전">‹</button>
  <button class="btn primary" id="nextBtn" onclick="go(1)">메뉴 정리하기</button>
</div>

<div class="toast" id="toast">복사했어요</div>

<script>
/* ===== OCR 설정: 배포한 Cloudflare Worker 주소를 여기에 넣으세요 ===== */
const WORKER_URL = "https://menu-check-564449764059.asia-northeast3.run.app";

/* ===================== 규칙엔진 ===================== */
const CATEGORIES = ['밥류','면류','탕찜전골','정육구이','해산물','세트코스','초밥','주류','음료','일반'];

/* 검수 항목별 드롭다운 선택지. 항목명에 포함된 키워드로 매칭.
   '직접 입력'을 고르면 자유 입력칸이 나타남. */
const FILL_OPTIONS = [
  {match:'조리/비조리', options:['조리','비조리','둘 다 판매','직접 입력']},
  {match:'총 피스',     options:['8P','10P','12P','15P','20P','직접 입력']},
  {match:'구성 종류',   options:['메뉴판에 구성 기재됨','사장님 구두 확인 완료','구성 변동 가능','직접 입력']},
  {match:'구성 정보',   options:['구성 텍스트 받음','사장님 구두 확인 완료','매장상황 따라 변동','직접 입력']},
  {match:'제공 갯수',   options:['1개','2개','3개','4개','직접 입력']},
  {match:'양 기준',     options:['1인분','2인분','3인분','소(小)','중(中)','대(大)','직접 입력']},
  {match:'맵기',        options:['맵기 선택 없음(단일)','순한맛/보통맛/매운맛','1단계/2단계/3단계','직접 입력']},
  {match:'옵션 적용',   options:['직접 입력']},
  {match:'주류 가격 분리',options:['주류 가격 별도','세트가에 포함','직접 입력']},
  {match:'고정 판매가', options:['가격 직접 입력']},
  {match:'판매 가격',   options:['직접 입력']},
  {match:'용량',        options:['355mL','500mL','355mL/500mL','1L','직접 입력']},
  {match:'구체적 품명', options:['직접 입력']},
  {match:'판매 시간대', options:['점심 한정(11~15시)','종일 판매','직접 입력']},
];
function fillOptionsFor(flag){
  const hit=FILL_OPTIONS.find(o=>flag.includes(o.match));
  return hit?hit.options:['직접 입력'];
}
// 카테고리 → Notion 태그 색상 (배경, 글자)

/* ===== 검수 유형 (S1 체크리스트 기반, 드롭다운) — 메뉴판 미수취/정보 부정확 제외 ===== */
const PASS = '이상 없음';
const PTYPES = [
  '01 조리/비조리','02 메뉴 구성','03 음료·주류 용량','04 메뉴 가격','05 이미지 부족', PASS,
];
// 자동 감지 수취항목(t) → 검수 유형 (드롭다운 기본값 도출)
const FLAG_PTYPE = {
  '조리/비조리 확인':'01 조리/비조리',
  '구성 정보 필요':'02 메뉴 구성','구성 종류 확인':'02 메뉴 구성','총 피스(P)수 확인':'02 메뉴 구성',
  '제공 갯수 확인':'02 메뉴 구성','주류 가격 분리 확인':'02 메뉴 구성','양 기준(인분/사이즈) 확인':'02 메뉴 구성',
  '옵션 적용 메뉴 확인':'02 메뉴 구성','판매 시간대 확인':'02 메뉴 구성',
  '용량(mL/L) 확인':'03 음료·주류 용량','구체적 품명 확인':'03 음료·주류 용량',
  '고정 판매가 확인':'04 메뉴 가격','판매 가격 확인':'04 메뉴 가격',

// 검수 유형 → 수동 지정 시 step2에서 물을 대표 수취 항목
const PTYPE_FLAG = {
  '01 조리/비조리':{t:'조리/비조리 확인'},
  '02 메뉴 구성':{t:'구성 정보 필요'},
  '03 음료·주류 용량':{t:'용량(mL/L) 확인'},
  '04 메뉴 가격':{t:'고정 판매가 확인'},

};
const PTYPE_COLOR = {

  '03 음료·주류 용량':['#E9F3E6','#4B7A3F'], '04 메뉴 가격':['#FBF3DB','#947101'],

// 자동 감지된 대표 문제유형 (최고 심각도 플래그 기준), 없으면 이상 없음
function autoPtype(item){
  const f = inspect(item, globalCook);
  if(!f.length) return PASS;
  return FLAG_PTYPE[f[0].t] || '02 메뉴 구성';
}
// 실제 적용 플래그: 이상없음→없음 / 수동지정→그 유형만 / 미지정→자동 다중감지
function effFlags(item){
  if(item.ptype===PASS) return [];
  if(item.ptype && PTYPE_FLAG[item.ptype]) return [PTYPE_FLAG[item.ptype]];
  return inspect(item, globalCook);
}
const SEAFOOD_COOKED = ['간장게장','양념게장','새우장','전복장','새우찜','홍합탕','전복버터구이','오징어볶음','한치물회','전복물회','고등어구이'];
const SIDE_MODUM = ['모둠버섯','모둠사리','모둠튀김','모둠어묵탕','모둠감자','모둠소세지','모둠소시지','모둠수육','모둠순대'];
const NOODLE_HOE_PASS = ['물회','막국수','냉면','비빔국수'];

const norm = s => (s||'').replace(/\s/g,'');
const inList = (name,list) => list.some(w => norm(name).includes(w));

// 수동 입력(파이프 형식 아닐 때)용 폴백 추정. Gemini 분류가 있으면 그걸 우선 사용.
function guessCategory(name){
  const n = norm(name);
  if(/초밥|스시|오마카세/.test(n)) return '초밥';
  if(/세트|코스|정식|모둠|한상|스페셜/.test(n)) return '세트코스';  // 사케세트 등 → 주류보다 우선
  if(/소주|맥주|막걸리|와인|테라|카스|참이슬|처음처럼|하이볼|사케|청하|클라우드|켈리|진로|위스키|보드카|생맥/.test(n)) return '주류';
  if(/콜라|사이다|제로|환타|스프라이트|주스|생수|음료|에이드|아메리카노|커피/.test(n)) return '음료';
  if(/볶음밥|비빔밥|덮밥|국밥|김밥|밥$|공기밥/.test(n)) return '밥류';
  if(/국수|냉면|라면|파스타|막국수|우동|짜장|짬뽕면/.test(n)) return '면류';
  if(/탕|전골|찜|찌개|샤브/.test(n)) return '탕찜전골';
  if(/삼겹|목살|등심|갈비|차돌|항정|스테이크/.test(n)) return '정육구이';
  if(/회|사시미|게장|새우|전복|홍합|오징어|문어|조개|굴|낙지|꼬막|대게|킹크랩|해산물|물회/.test(n)) return '해산물';
  return '일반';
}

const det = {
  hasP:       n => /\d+\s*(P|피스|pc)/i.test(n),
  hasCount:   n => /\d+\s*(개|점|P|피스|pc)/i.test(n),
  hasComp:    n => n.includes('+'),
  hasPortion: n => /인분|인용|\d+\s*인|사이즈|\((대|중|소)\)|(대|중|소)\s*\/\s*(대|중|소)/.test(n),
  hasVolume:  n => /\d+\s*(ml|l|리터|cc)/i.test(n),
  hasTime:    n => /\d+\s*시|\d{1,2}:\d{2}|오전|오후|런치타임|~/.test(n),
  isMarket:   s => /싯가|시가|당일시가|시세/.test(s),
  // 구체적 품명 없이 일반 명칭만 적힌 경우 판별 (예: "음료수", "맥주", "소주", "와인", "주스")
  // 브랜드/종류가 함께 있으면(예: "카스 맥주", "참이슬", "하이트") 통과
  isGenericDrink: n => {
    const x = norm(n);
    // 일반 명칭 단독 패턴: 해당 단어로만 구성되거나 수식어 없이 쓰인 경우
    const genericWords = ['음료수','음료','콜라','사이다','제로콜라','탄산','맥주','생맥주','소주','막걸리','와인','주스','에이드','하이볼','사케','청주','위스키','칵테일','커피','차','탄산음료'];
    // 브랜드/구체 키워드가 하나라도 있으면 구체적인 것으로 간주 → 통과
    const brandHints = /카스|테라|하이트|클라우드|켈리|오비|참이슬|처음처럼|진로|좋은데이|새로|c1|화요|일품|백세주|국순당|장수|느린마을|복순도가|코카|펩시|칠성|스프라이트|환타|델몬트|미닛메이드|아메리카노|라떼|에스프레소|카푸치노|아인슈페너|모히토|마가리타|하이네켄|아사히|삿포로|기린|칭따오|버드와이저|코로나|스텔라|기네스|호가든|산토리|발렌타인|조니워커|잭다니엘|글렌|맥캘란|샤르도네|까베르네|메를로|피노|모스카토|샴페인|프로세코/i;
    if (brandHints.test(x)) return false;
    // 일반 명칭이 포함되어 있고, 그 명칭이 메뉴명의 핵심인 경우 → 구체화 필요
    return genericWords.some(w => x.includes(w));
  },
  // 맵기 옵션이 있을 법한 메뉴 (찌개·제육·떡볶이·불 시리즈 등)
  hasSpice:   n => /불닭|마라|매운|매콤|얼큰|땡초|핵불|불막창|불곱창|불족|짬뽕|떡볶이|제육|쭈꾸미|주꾸미|낙지볶음|닭갈비|부대찌개|김치찌개|아구찜|해물찜|찜닭|매운갈비찜|불막국수|불짬뽕/.test(norm(n)),
  // 이미 맵기 단계가 표기돼 있으면 통과
  hasSpiceLevel: n => /순한|덜매운|아주매운|[1-9]\s*단계|맵기(선택|조절)|순한맛|보통맛|매운맛|중간맛/.test(n),
  // 어느 메뉴에 붙는지 모호한 옵션성 항목 (추가·사리·토핑 등)
  isOption:   n => /(^|\s|\+)(추가|사리|토핑|리필|곱빼기|곱배기|옵션)(\s|$|\))|추가\s*요금|추가\s*선택/.test(n),
  // 생물 횟감(순수 회/사시미) — 인분수 수취 대상. 회무침·회덮밥·매운탕 등 요리물은 제외
  isSashimi:  n => {
    const x = norm(n);
    return /회|사시미|활어|선어|숙성/.test(x)
        && !/무침|덮밥|비빔|냉면|초밥|볶음|찜|구이|조림|튀김|탕|전골|매운/.test(x);
  },
};

function inspect(item, globalCook){
  const n = item.name, cat = item.cat, price = item.price||'';
  const nn = norm(n);
  // 구조화 필드 (JSON 추출분) — 있으면 검수 통과 근거로 사용
  const comps = Array.isArray(item.components) ? item.components.filter(Boolean) : [];
  const hasComponents = comps.length > 0;
  const amount = item.amount||'', serves = item.serves||'';
  const hasAmount = norm(amount)!=='';
  const hasServes = norm(serves)!=='';
  const priceNote = item.priceNote||'';
  // 수량 필드에 피스/개수/중량 표기가 들어왔는지
  const amtHasP     = det.hasP(amount);
  const amtHasCount = det.hasCount(amount);
  // 구성이 이미 기재됨 → 패스: components 채워짐 / +기호 / 메인·사이드 표기 / 쉼표 나열
  const compWritten = hasComponents || det.hasComp(n) || /메인\s*[:：]|사이드\s*[:：]/.test(n) || (n.split(/[,，]/).length>=3);

  // 플래그 = { t:항목명, s:심각도(block|must|rec) }
  const flags = [];
  const add = (t,s)=>flags.push({t,s});

  // A. 조리/비조리  [탕찜전골, 정육구이] — 필수확인
  if(cat==='탕찜전골' || cat==='정육구이'){
    // 탕수육·탕수 류는 '탕'이 들어가도 튀김요리(항상 조리)이므로 제외
    const hasTangJjim = /탕|전골|찜|찌개|샤브|국밥|삼계/.test(nn) && !/탕수/.test(nn);
    const pass =
      /조림/.test(nn) ||
      (/볶음/.test(nn) && !hasTangJjim) ||   // 낙지볶음=패스, 닭볶음탕=트리거
      inList(n,NOODLE_HOE_PASS) ||
      inList(n,SEAFOOD_COOKED) ||
      globalCook ||
      !!item.cook;   // 메뉴 확인 카드에서 조리여부를 직접 고르면 통과
    if(!pass && (hasTangJjim || /구이/.test(nn))) add('조리/비조리 확인','must');
  }

  // B. 초밥  [초밥] — amount(피스)·components(구성)가 채워졌으면 통과. 권장
  if(cat==='초밥'){
    if(/모둠|모듬/.test(nn)){
      if(!det.hasP(n) && !amtHasP) add('총 피스(P)수 확인','rec');
      if(!compWritten) add('구성 종류 확인','rec');
    } else if(!det.hasCount(n) && !amtHasCount){
      add('제공 갯수 확인','rec');
    }
  }

  // C. 세트 구성·주류분리  [세트코스]
  if(cat==='세트코스'){
    // 세트/코스/정식의 구성은 카탈로그 필수 — 텍스트로 구성 확보 안 되면 필수확인
    if(!compWritten && !inList(n,SIDE_MODUM)) add('구성 정보 필요','must');
    // 세트에 주류 결합 → 주류 가격 분리 (주류 50% 초과 불가) — 필수확인
    if(/소주|맥주|막걸리|와인|하이볼|사케|청하|생맥|위스키|준마이/.test(nn+comps.join('')))
      add('주류 가격 분리 확인','must');
  }

  // C-2. 모둠회 등 해산물 구성·양  [해산물] — 권장
  if(cat==='해산물'){
    if(!compWritten && !inList(n,SIDE_MODUM) && !inList(n,SEAFOOD_COOKED) && /모둠|모듬|스페셜|세트|코스|정식|한상/.test(nn))
      add('구성 종류 확인','rec');
    // 양(인분) 기준은 '순수 회/사시미(생물 횟감)'에 한해서만 수취. 회무침·매운탕 등 요리물 제외
    if(det.isSashimi(n) && !(det.hasPortion(n)||det.hasCount(n)||det.hasVolume(n)||hasAmount))
      add('양 기준(인분/사이즈) 확인','rec');
  }

  // 옵션 매핑 모호 (추가·사리·토핑 등이 어느 메뉴에 붙는지) — 필수확인
  if(det.isOption(n)) add('옵션 적용 메뉴 확인','must');

  // D. 가격  [전 카테고리] — 시가/변동가 → 등록불가(반려), 가격 누락 → 반려
  if(det.isMarket(n) || det.isMarket(price) || det.isMarket(priceNote) || /한정|변동|문의/.test(priceNote))
    add('고정 판매가 확인','block');
  else if(!price || norm(price)==='') add('판매 가격 확인','block');

  // E. 용량·품명  [주류, 음료] — amount 에 용량이 들어왔으면 통과. 필수확인
  if(cat==='주류' || cat==='음료'){
    if(!det.hasVolume(n) && !det.hasVolume(amount)) add('용량(mL/L) 확인','must');
    if(det.isGenericDrink(n)) add('구체적 품명 확인','must');
  }

  // F. 점심·특선  [메뉴명 패턴, 카테고리 무관] — 권장
  if(/점심|특선|런치/.test(nn) && !det.hasTime(n)) add('판매 시간대 확인','rec');

  // 항목명 기준 중복 제거 (전부 동일 필수 — 정렬 없음, 감지 순서 유지)
  const seen={};
  return flags.filter(f=>seen[f.t]?false:(seen[f.t]=true));
}

/* ===================== 상태 ===================== */
let step = 0, items = [], globalCook = false, ocrMenuCount = 0;
let collapsed = {};   // 디쉬그룹 접힘 상태 { 그룹명: true }
let unreadables = []; // 판독 불가 영역 [{photo, where, reason, crop|thumb}]
let photoImages = []; // 분석에 보낸 사진 base64(원본 순서) — 크롭용

// 디쉬 1개의 표준 형태 (모든 필드 기본값 보장)
function makeItem(o){
  return Object.assign({
    group:'', groupNote:'', name:'', price:'', priceNote:'',
    cat:'일반', ptype:'', amount:'', serves:'', cook:'', components:[], answers:{}, flags:[]
  }, o||{});
}

// 백엔드 JSON(menu.groups[].dishes[]) → 평면 items[] (그룹 정보 보존)
function flattenMenu(menu){
  const out=[];
  (menu.groups||[]).forEach(g=>{
    const gname=g.name||'', gnote=g.note||'';
    (g.dishes||[]).forEach(d=>{
      out.push(makeItem({
        group:gname, groupNote:gnote,
        name:d.name||'',
        price:(d.price==null?'':String(d.price).replace(/[^\d]/g,'')),
        priceNote:d.priceNote||'',
        cat:CATEGORIES.includes(d.category)?d.category:guessCategory(d.name||''),
        amount:d.amount||'', serves:d.serves||'',
        components:Array.isArray(d.components)?d.components.filter(Boolean):[]
      }));
    });
  });
  return out;
}

/* ===================== OCR ===================== */
const resizeImage = (file,maxDim=1600) => new Promise(res=>{
  const img=new Image(), url=URL.createObjectURL(file);
  img.onload=()=>{
    let w=img.width,h=img.height;
    if(Math.max(w,h)>maxDim){const s=maxDim/Math.max(w,h);w=Math.round(w*s);h=Math.round(h*s);}
    const c=document.createElement('canvas');c.width=w;c.height=h;
    c.getContext('2d').drawImage(img,0,0,w,h);
    URL.revokeObjectURL(url);
    res(c.toDataURL('image/jpeg',0.85).split(',')[1]);
  };
  img.onerror=()=>res(null); img.src=url;
});

// Vision 단어+좌표 → 줄 단위 텍스트
function visionToLines(words){
  if(!words||!words.length) return [];
  const ws = words.map(w=>{
    const v=w.boundingPoly.vertices;
    const xs=v.map(p=>p.x||0), ys=v.map(p=>p.y||0);
    return {t:w.description, x:Math.min(...xs), yc:(Math.min(...ys)+Math.max(...ys))/2, h:Math.max(...ys)-Math.min(...ys)};
  });
  const avgH = ws.reduce((s,w)=>s+w.h,0)/ws.length;
  ws.sort((a,b)=>a.yc-b.yc);
  const lines=[]; let cur=[];
  ws.forEach(w=>{
    if(!cur.length){cur.push(w);return;}
    const refY=cur.reduce((s,x)=>s+x.yc,0)/cur.length;
    if(Math.abs(w.yc-refY)>avgH*0.6){lines.push(cur);cur=[w];} else cur.push(w);
  });
  if(cur.length) lines.push(cur);
  return lines.map(l=>l.sort((a,b)=>a.x-b.x).map(w=>w.t).join(' '));
}

// ── 판독 불가 영역 크롭 (bbox 비율좌표 → 썸네일 dataURL) ──
function isValidBbox(b){
  return Array.isArray(b) && b.length===4 && b.every(n=>!isNaN(Number(n))) && Number(b[2])>0 && Number(b[3])>0;
}
function cropImage(b64, bbox){
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>{
      const W=img.width, H=img.height;
      let sx=Math.max(0,Math.min(1,Number(bbox[0])))*W;
      let sy=Math.max(0,Math.min(1,Number(bbox[1])))*H;
      let sw=Math.min(1,Number(bbox[2]))*W;
      let sh=Math.min(1,Number(bbox[3]))*H;
      if(sx+sw>W) sw=W-sx;
      if(sy+sh>H) sh=H-sy;
      if(sw<6 || sh<6){ res(null); return; }   // 너무 작으면 폴백
      const scale=Math.min(1, 240/sw);
      const c=document.createElement('canvas');
      c.width=Math.round(sw*scale); c.height=Math.round(sh*scale);
      c.getContext('2d').drawImage(img, sx,sy,sw,sh, 0,0,c.width,c.height);
      try{ res(c.toDataURL('image/jpeg',0.82)); }catch(e){ res(null); }
    };
    img.onerror=()=>res(null);
    img.src='data:image/jpeg;base64,'+b64;
  });
}

// ── 자동 배치 처리: 사진이 많으면 작게 나눠 여러 번 호출 후 병합 ──
const BATCH_SIZE = 4;   // 한 번에 보낼 사진 수 (토큰 한도 안전선)
const CONCURRENCY = 2;  // 동시 호출 수

// 한 묶음(이미지 배열) 분석 → menu 반환, 실패 시 throw
async function analyzeBatch(b64arr){
  const r = await fetch(WORKER_URL,{
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({ mode:'vision', images:b64arr, mediaTypes:b64arr.map(()=>'image/jpeg') })
  });
  const j = await r.json();
  if(j.error){
    const msg = (typeof j.error==='string') ? j.error : (j.error.message || JSON.stringify(j.error));
    throw new Error('[HTTP '+r.status+'] '+msg);
  }
  if(!j.menu || !Array.isArray(j.menu.groups)) throw new Error('메뉴를 추출하지 못했어요');
  return j.menu;
}

// 여러 menu 결과를 그룹/디쉬 기준으로 병합 (그룹명·디쉬명 중복 제거)
function mergeMenus(menus){
  const order=[], map={};
  menus.forEach(m=>{
    (m.groups||[]).forEach(g=>{
      const key=norm(g.name||'');
      if(!map[key]){ map[key]={name:g.name||'', note:g.note||'', dishes:[], dseen:{}}; order.push(key); }
      const grp=map[key];
      if(!grp.note && g.note) grp.note=g.note;
      (g.dishes||[]).forEach(d=>{
        const dk=norm(d.name||'')+'|'+(d.price==null?'':d.price);
        if(d.name && grp.dseen[dk]) return;   // 동일 메뉴 중복 스킵
        grp.dseen[dk]=true; grp.dishes.push(d);
      });
    });
  });
  return { groups: order.map(k=>({name:map[k].name, note:map[k].note, dishes:map[k].dishes})) };
}

// 동시성 제한하여 배치 실행 → 각 배치 결과 {ok, menu|error}
async function runBatches(batches, onProgress){
  const results=new Array(batches.length); let done=0, idx=0;
  async function worker(){
    while(idx<batches.length){
      const my=idx++;
      try{ results[my]={ok:true, menu:await analyzeBatch(batches[my])}; }
      catch(e){ results[my]={ok:false, error:String(e.message||e)}; }
      onProgress(++done, batches.length);
    }
  }
  await Promise.all(Array.from({length:Math.min(CONCURRENCY,batches.length)}, worker));
  return results;
}

async function handlePhotos(files){
  if(!files.length) return;
  if(!WORKER_URL){
    flash('서버 주소(WORKER_URL)가 설정되지 않았어요');
    setStatus('⚠ 코드 상단 WORKER_URL을 먼저 입력해주세요. (지금은 텍스트 입력으로 테스트 가능)');
    return;
  }
  const fileArr = Array.from(files);
  const total = fileArr.length;
  unreadables = [];

  // ── 모든 이미지를 base64로 변환 (고해상도 위해 maxDim 2000) ──
  setStatus('<span class="spin"></span>사진 준비 중... (0/'+total+'장)');
  const imagesB64 = [];
  for(let i=0;i<fileArr.length;i++){
    const b64 = await resizeImage(fileArr[i], 2000);
    if(b64) imagesB64.push(b64);
    setStatus('<span class="spin"></span>사진 준비 중... ('+(i+1)+'/'+total+'장)');
  }
  if(!imagesB64.length){ setStatus('⚠ 이미지를 처리하지 못했어요. 다시 시도해주세요.'); resetFileInputs(); return; }

  // ── 자동 배치: BATCH_SIZE 장씩 나눠 분석 후 병합 (사진 많아도 토큰 한도 회피) ──
  const batches=[];
  for(let i=0;i<imagesB64.length;i+=BATCH_SIZE) batches.push(imagesB64.slice(i,i+BATCH_SIZE));
  const batchTxt = batches.length>1 ? ' (0/'+batches.length+' 묶음)' : '';
  setStatus('<span class="spin"></span>AI가 메뉴판을 읽고 정리하는 중...'+batchTxt);
  const results = await runBatches(batches,(done,tot)=>{
    setStatus('<span class="spin"></span>AI가 메뉴판을 읽고 정리하는 중...'+(tot>1?' ('+done+'/'+tot+' 묶음)':''));
  });

  photoImages = imagesB64;   // 크롭용으로 보관
  const okMenus = []; const errs = []; const rawUnread = [];
  results.forEach((r,k)=>{
    if(!r.ok){ errs.push(r.error); return; }
    okMenus.push(r.menu);
    // 배치 내 image(1부터) → 원본 사진 번호로 환산
    (r.menu.unreadable||[]).forEach(u=>{
      const photo = k*BATCH_SIZE + (Number(u.image)||1);
      rawUnread.push({ photo, where:u.where||'', reason:u.reason||'', bbox:u.bbox });
    });
  });
  if(!okMenus.length){
    setStatus('⚠ 분석 오류: '+(errs[0]||'알 수 없는 오류')); resetFileInputs(); return;
  }

  items = flattenMenu(mergeMenus(okMenus));
  if(!items.length){ setStatus('⚠ 메뉴를 추출하지 못했어요. 사진을 다시 확인하거나 직접 입력해주세요.'); resetFileInputs(); return; }

  // 같은 사진·영역·사유끼리 병합 (행마다 쪼개진 것 합치고 bbox 는 합집합)
  const consol={};
  rawUnread.forEach(u=>{
    const key=u.photo+'|'+u.where+'|'+u.reason;
    if(!consol[key]) consol[key]={photo:u.photo, where:u.where, reason:u.reason, boxes:[]};
    if(isValidBbox(u.bbox)) consol[key].boxes.push(u.bbox.map(Number));
  });
  const mergedUnread = Object.values(consol).map(c=>{
    let bbox=null;
    if(c.boxes.length){
      const x0=Math.min(...c.boxes.map(b=>b[0])), y0=Math.min(...c.boxes.map(b=>b[1]));
      const x1=Math.max(...c.boxes.map(b=>b[0]+b[2])), y1=Math.max(...c.boxes.map(b=>b[1]+b[3]));
      bbox=[x0,y0,x1-x0,y1-y0];
    }
    return {photo:c.photo, where:c.where, reason:c.reason, bbox};
  });

  // 판독 불가 영역: bbox 있으면 그 부분 크롭, 없으면 사진 전체 썸네일로 폴백
  unreadables = [];
  for(const u of mergedUnread){
    const b64 = photoImages[u.photo-1];
    let crop=null;
    if(b64 && isValidBbox(u.bbox)) crop = await cropImage(b64, u.bbox);
    unreadables.push({ photo:u.photo, where:u.where, reason:u.reason,
      crop, thumb:(!crop && b64) ? ('data:image/jpeg;base64,'+b64) : null });
  }

  collapsed = {};
  ocrMenuCount = items.length;   // 이미지 품질 경고용
  resetFileInputs();
  setStatus(errs.length
    ? '✓ '+items.length+'개 메뉴 정리 (일부 '+errs.length+'묶음 실패 — 누락분은 직접 추가하세요)'
    : '✓ '+items.length+'개 메뉴를 정리했어요.');
  step = 1; render();
}
// 수동 입력(직접 입력 텍스트)용: 파이프(메뉴명|가격|카테고리) 또는 일반 텍스트 줄 → items
function parseLines(lines){
  return lines.map(line=>{
    if(line.includes('|')){
      const p = line.split('|').map(s=>s.trim());
      let name=p[0]||'', price=(p[1]||'').replace(/,/g,'').replace(/원/g,''), cat=p[2]||'', priceNote='';
      if(/싯가|시가|당일시가|시세|변동|문의|당일가|한정/.test(price)){priceNote=price;price='';}
      if(!CATEGORIES.includes(cat)) cat=guessCategory(name);
      return makeItem({name,price,priceNote,cat});
    }
    const m=line.match(/([\d][\d,]*)\s*원?\s*$/);
    let price='',name=line,priceNote='';
    if(m){price=m[1].replace(/,/g,'');name=line.slice(0,m.index).trim();}
    if(/싯가|시가|당일시가|시세/.test(line)){priceNote='시가';price='';}
    if(!name) name=line;
    return makeItem({name,price,priceNote,cat:guessCategory(name)});
  });
}

// 판독 불가 배너 HTML (메뉴 확인 최상단)

  return `<div class="nrbanner">`

function renderRows(){
  const box=document.getElementById('rows');
  if(!items.length){box.innerHTML='<div class="empty">입력된 메뉴가 없어요.<br>이전 화면에서 메뉴를 입력해주세요.</div>';return;}
  box.innerHTML='';
  // 판독 불가 배너 (최상단)
  if(unreadables.length) box.insertAdjacentHTML('beforeend', unreadableBannerHtml());
  // 이미지 품질 경고 (검사 G): OCR로 들어온 메뉴가 비정상적으로 적으면 화질/잘림 의심
  if(ocrMenuCount && ocrMenuCount < 4){
    const warn=document.createElement('div');
    warn.className='imgwarn';
    warn.innerHTML='인식된 메뉴가 '+ocrMenuCount+'개뿐이에요. 메뉴판 화질 저하·빛번짐·글자 잘림이 있는지 확인하고, 필요하면 다시 촬영해주세요.';
    box.appendChild(warn);
  }
  // 그룹 순서 보존하며 묶기
  const groups=[]; const idx={};
  items.forEach((it,i)=>{
    const key=it.group||'';
    if(!(key in idx)){ idx[key]=groups.length; groups.push({key, note:it.groupNote||'', list:[]}); }
    if(!groups[idx[key]].note && it.groupNote) groups[idx[key]].note=it.groupNote;
    groups[idx[key]].list.push(i);
  });
  groups.forEach(g=>{
    if(g.key){
      const open = !collapsed[g.key];
      const head=document.createElement('div');
      head.className='grphead';
      head.innerHTML=`<span class="chev ${open?'':'closed'}">▾</span>
        <span class="gname">${esc(g.key)}</span>
        ${g.note?`<span class="gnote">· ${esc(g.note)}</span>`:''}
        <span class="gcount">${g.list.length}</span>`;
      head.onclick=()=>{ collapsed[g.key]=!collapsed[g.key]; renderRows(); };
      box.appendChild(head);
      if(!open) return;   // 접힘: 하위 디쉬 렌더 생략
    }
    g.list.forEach(i=>box.appendChild(renderDishCard(i)));
  });
}
function badgeHtml(flags){

    ?`<div class="badge">${flags.map(f=>`<span class="pill">${esc(f.t)}</span>`).join('')}</div>`

// 수취 항목(flags) → 입력이 필요한 카드 필드 매핑 (빈 칸 붉은 강조용)
function reqFields(flags){
  const r={};
  (flags||[]).forEach(f=>{
    const t=f.t||'';
    if(t.includes('구성')) r.comp=1;
    if(t.includes('피스')||t.includes('갯수')||t.includes('양')||t.includes('제공')||t.includes('용량')){ r.amount=1; r.serves=1; }
    if(t.includes('가격')) r.price=1;
    if(t.includes('품명')) r.name=1;   // 구체적 품명 확인 → 디쉬명 강조
  });
  return r;
}
// 빈 칸 붉은 강조를 현재 flags 기준으로 갱신(재렌더 없이 → 입력 포커스 유지)
function applyReq(el,it){
  const r=reqFields(it.flags);
  const comp=el.querySelector('input.comp'); if(comp) comp.classList.toggle('req',!!r.comp);
  const price=el.querySelector('input.price'); if(price) price.classList.toggle('req',!!r.price);
  const amt=el.querySelector('input.amt'); if(amt) amt.classList.toggle('req',!!r.amount);
  const nm=el.querySelector('input.name'); if(nm) nm.classList.toggle('reqname',!!r.name);
}

function upd(i,key,val){
  if(key==='price'){ val=val.replace(/[^\d]/g,''); if(val) items[i].priceNote=''; }
  items[i][key]=val;
  // 카테고리 변경만 전체 재렌더(드롭다운은 포커스 유지됨).
  // 이름/가격/수량 등은 input에 이미 글자가 들어가 있으므로 재렌더 없이 badge만 갱신 → 키보드 유지
  if(key==='cat'){ renderRows(); }
  else { refreshBadge(i); }
}

  refreshBadge(i);
}
function refreshBadge(i){
  const el=document.querySelector('.row[data-i="'+i+'"]'); if(!el) return;
  const it=items[i];
  it.flags=effFlags(it);
  const old=el.querySelector('.badge');
  if(old){ old.outerHTML=badgeHtml(it.flags); }
  applyReq(el,it);
}
function addRow(){items.push(makeItem({cat:'일반'}));renderRows();}
function delRow(i){items.splice(i,1);renderRows();}

function renderFills(){
  const box=document.getElementById('fills');
  const need=items.map((it,i)=>({it,i})).filter(x=>x.it.flags.length);
  if(!need.length){box.innerHTML='<div class="empty">추가로 확인할 항목이 없어요. 🎉<br>바로 출력으로 넘어가세요.</div>';return;}
  box.innerHTML='';
  need.forEach(({it,i})=>{
    let inner=`<div class="mname">${esc(it.name)||'(이름 없음)'}</div>`;
    it.flags.forEach(f=>{
      if(f.t.includes('조리/비조리')){
        const cur=(it.answers[f.t]||'').split(',').map(s=>s.trim()).filter(Boolean);
        inner+=`<div class="ask">${esc(f.t)} <span class="askn">(둘 다 판매 시 모두 선택)</span></div>
          <div class="seg">
            <button class="${cur.includes('조리')?'sel':''}" onclick="toggleCook(${i},'${esc(f.t)}','조리')">조리</button>
            <button class="${cur.includes('비조리')?'sel':''}" onclick="toggleCook(${i},'${esc(f.t)}','비조리')">비조리</button>
          </div>`;
      } else if(f.t.includes('가격')){
        // 가격은 드롭다운 없이 바로 입력
        const cur=it.answers[f.t]||'';
        inner+=`<div class="ask">${esc(f.t)} <span class="askn">(받아온 판매 가격을 입력)</span></div>
          <input class="ans" inputmode="numeric" value="${esc(cur)}" placeholder="예: 30,000" oninput="setAns(${i},'${esc(f.t)}',this.value)">`;
      } else if(f.t.includes('구성')){
        // 구성도 드롭다운 없이 바로 입력
        const cur=it.answers[f.t]||'';
        inner+=`<div class="ask">${esc(f.t)} <span class="askn">(받아온 구성을 입력)</span></div>
          <input class="ans" value="${esc(cur)}" placeholder="예: 광어, 우럭, 연어, 참치" oninput="setAns(${i},'${esc(f.t)}',this.value)">`;
      } else {
        const opts=fillOptionsFor(f.t);
        const cur=it.answers[f.t]||'';
        const customOpt = opts.find(o=>o.includes('직접 입력')) || '직접 입력';
        // 현재 값이 드롭다운 선택지에 있으면 그걸 선택, 없으면(자유 입력값) 직접 입력 모드
        const isPreset=opts.includes(cur);
        const showCustom = (cur!=='' && !isPreset);
        const selVal = showCustom ? customOpt : cur;
        const optHtml=['<option value="">선택…</option>']
          .concat(opts.map(o=>`<option value="${esc(o)}" ${o===selVal?'selected':''}>${o}</option>`)).join('');
        inner+=`<div class="ask">${esc(f.t)}</div>
          <select class="ansSel" onchange="setAnsSel(${i},'${esc(f.t)}',this)">${optHtml}</select>
          <input class="ans" style="margin-top:6px;${showCustom?'':'display:none'}" value="${showCustom?esc(cur):''}" placeholder="${esc(customOpt)}" oninput="setAns(${i},'${esc(f.t)}',this.value)">`;
      }
    });
    const el=document.createElement('div');el.className='fill';el.innerHTML=inner;box.appendChild(el);
  });
}
function setAns(i,f,v){items[i].answers[f]=v;}
function setAnsSel(i,f,sel){
  const v=sel.value;
  const custom=sel.nextElementSibling;   // 셀렉트 바로 다음 입력칸(같은 항목)만 정확히 타겟
  if(v.includes('직접 입력')){
    if(custom){ custom.style.display=''; custom.value=''; custom.focus(); }
    items[i].answers[f]='';
  } else {
    if(custom){ custom.style.display='none'; custom.value=''; }
    items[i].answers[f]=v;
  }
}
function toggleCook(i,f,val){
  const cur=(items[i].answers[f]||'').split(',').map(s=>s.trim()).filter(Boolean);
  const k=cur.indexOf(val); if(k>=0) cur.splice(k,1); else cur.push(val);
  items[i].answers[f]=['조리','비조리'].filter(o=>cur.includes(o)).join(', ');
  renderFills();
}

function renderOut(){
  // 그룹 순서 보존하며 묶기
  const groups=[]; const idx={};
  items.filter(it=>it.name).forEach(it=>{
    const key=it.group||'';
    if(!(key in idx)){ idx[key]=groups.length; groups.push({key, note:it.groupNote||'', list:[]}); }
    if(!groups[idx[key]].note && it.groupNote) groups[idx[key]].note=it.groupNote;
    groups[idx[key]].list.push(it);
  });
  items.forEach(it=>{ it.flags=effFlags(it); });
  const menu=groups.map(g=>{
    const head = g.key ? `【${g.key}】${g.note?' ('+g.note+')':''}\n` : '';
    const body = g.list.map(it=>{
      let line='· '+it.name;
      const qty=[it.amount,it.serves].filter(Boolean).join(', ');
      if(qty) line+=' '+qty;
      if(it.cook) line+=' ('+it.cook+')';
      if(it.price) line+='  '+fmtPrice(it.price);
      else if(it.priceNote) line+='  '+it.priceNote;
      if(it.components && it.components.length) line+='\n    구성: '+it.components.join(', ');
      const ans=it.flags.map(f=>it.answers[f.t]).filter(Boolean);
      if(ans.length) line+='\n    ('+ans.join(' / ')+')';
      return line;
    }).join('\n');
    return head+body;
  }).join('\n\n');
  const nrTxt = unreadables.length
    ? '⚠ 판독 불가 '+unreadables.length+'건 (다시 촬영 필요)\n'
      + unreadables.map(u=>`  · 사진 ${u.photo} · ${u.where||'영역 불명'} · ${u.reason||''}`).join('\n')
      + '\n\n'
    : '';
  document.getElementById('outMenu').textContent=nrTxt+(menu||'메뉴가 없습니다.');
  const ask=items.filter(it=>it.flags.length).map(it=>{
    const remain=it.flags.filter(f=>!it.answers[f.t]);
    return remain.length?`${it.name} : ${remain.map(f=>f.t).join(' / ')}`:null;
  }).filter(Boolean).join('\n');
  document.getElementById('outAsk').textContent=ask||'모두 확인 완료되었습니다. ✓';
}

/* ===================== 네비게이션 ===================== */
const titles=[
  ['메뉴 입력','메뉴판 사진을 찍거나 텍스트를 붙여넣으세요'],
  ['메뉴 확인','그룹·구성·수량·가격을 확인하고 고쳐주세요'],
  ['확인사항 입력','사장님께 받아온 내용을 채워주세요'],
  ['최종 정리','복사해서 그대로 붙여넣으세요'],
];
const nextLabels=['메뉴 정리하기','확인사항 보기','최종 정리하기','복사하기'];

function go(dir){
  if(dir>0){
    if(step===0){items=parseRaw();if(!items.length){flash('메뉴를 입력해주세요');return;} ocrMenuCount=0; unreadables=[]; photoImages=[];}
    if(step===3){copyAll();return;}
    step++;
  } else step--;
  render();
}
function render(){
  document.querySelectorAll('.page').forEach((p,i)=>p.classList.toggle('show',i===step));
  document.querySelectorAll('.steps .dot').forEach((d,i)=>{
    d.classList.toggle('on',i===step);
    d.classList.toggle('done',i<step);
  });
  document.getElementById('title').textContent=titles[step][0];
  document.getElementById('subtitle').textContent=titles[step][1];
  document.getElementById('nextBtn').textContent=nextLabels[step];
  document.getElementById('backBtn').style.display=step===0?'none':'block';
  if(step===1) renderRows();
  if(step===2){items.forEach(it=>it.flags=effFlags(it));renderFills();}
  if(step===3) renderOut();
  window.scrollTo(0,0);
}
function copyAll(){
  const t=document.getElementById('outMenu').textContent+'\n\n[확인 요청]\n'+document.getElementById('outAsk').textContent;
  navigator.clipboard.writeText(t).then(()=>flash('복사했어요')).catch(()=>flash('복사 실패'));
}
// 완료 → 처음 입력 화면으로 (입력 내용 초기화)
function restart(){
  items=[]; globalCook=false; ocrMenuCount=0; unreadables=[]; photoImages=[]; collapsed={};
  const raw=document.getElementById('raw'); if(raw) raw.value='';
  const st=document.getElementById('status'); if(st){ st.className='status'; st.innerHTML=''; }
  step=0; render();
}
let toastT;
function flash(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),1600);}
</script>
